spring:
  application:
    name: devqrh
  main:
    banner-mode: off

server:
  port: 8080

devqrh:
  data-path: data
  matcher-config-path: src/main/resources/matcher/matching-config.yaml
  cors:
    allowed-origin-patterns: "http://localhost:*,http://127.0.0.1:*,http://10.0.2.2:*"
  auto-reload:
    enabled: true
    debounce-ms: 500
  admin:
    reload:
      require-token: false
      token: ""
  health:
    include-source-locations: true
