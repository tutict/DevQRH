id: io_bottleneck
title: IO Bottleneck
keywords:
  - io
  - disk
  - iowait
  - bottleneck
  - service lag
  - latency
symptoms:
  - disk busy
  - io wait high
  - service lag
  - response delay
immediate_actions:
  - step: 1
    action: "iostat -xz 1 3"
  - step: 2
    action: "pidstat -d 1"
  - step: 3
    action: "lsof -p {pid}"
decision_tree:
  - condition: "device util near 100%"
    action: "move load or throttle writes"
  - condition: "single process saturating disk"
    action: "inspect hot files and write path"
root_cause:
  - disk contention
  - large sync writes
long_term_fix:
  - isolate noisy workload
  - optimize write pattern
