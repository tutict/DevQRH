id: memory_leak
title: Memory Leak
keywords:
  - memory
  - heap
  - gc
  - oom
  - leak
symptoms:
  - heap keeps growing
  - frequent GC
  - OOM risk
  - service slow
immediate_actions:
  - step: 1
    action: "jstat -gcutil {pid} 1000"
  - step: 2
    action: "jmap -histo:live {pid}"
  - step: 3
    action: "capture heap dump"
decision_tree:
  - condition: "old gen rising"
    action: "analyze retained objects"
  - condition: "metaspace high"
    action: "check classloader leak"
root_cause:
  - object retention
  - cache not evicted
long_term_fix:
  - add leak tests
  - cap cache size
